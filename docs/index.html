<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jurdus Projects</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #000;
      font-size: 14px;
    }

    a { color: #000; }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── header ── */
    header {
      border-bottom: 2px solid #000;
      padding: 16px 0;
    }
    header.bottom {
      padding: 0;
    }
    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-weight: 600;
      font-size: 3rem;
      letter-spacing: .05em;
      text-transform: uppercase;
      
    }
    .name {
      font-weight: 100;
      font-size: 2rem;
      letter-spacing: .05em;
      
    }
    .gh-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      text-decoration: none;
      color: #555;
    }
    .gh-link:hover { color: #000; }

    /* ── hero ── */
    .hero {
      padding: 2rem 0 48px;
    }

    .btn {
      margin-top: 8px;
      display: inline-block;
      padding: 8px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 2rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #000; color: #fff; }
    .btn-primary:hover { background: #222; }
    .btn-ghost {
      color: #000;
      border: 1px solid #000;
    }
    .btn-spotify{
      background: 	#1db954;
    }
    .btn-soundcloud{
      background: #f50;
    }
    .btn-github{
      background: #8534F3;
    }
    .btn-alterdrop{
        background: #96b2ff;
    }
    .btn-maurice{
        background: #FFD369;
    }
    .btn-ghost:hover { background: #f5f5f5; }

    /* ── ad slot ── */
    .ad-slot {
      border: 1px dashed #ccc;
      padding: 8px;
      text-align: center;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 32px 0;
    }
    .ad-label { font-size: 11px; color: #bbb; letter-spacing: .08em; }

    /* ── sections ── */
    section { padding: 40px 0; border-bottom: 1px solid #ddd; }

    .section-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 24px;
    }

    /* ── stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border: 1px solid #000;
    }
    .stat {
      padding: 20px 16px;
      border-right: 1px solid #000;
    }
    .stat:last-child { border-right: none; }
    .stat-value {
      font-size: 28px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label { font-size: 12px; color: #888; }
    .sk { background: #eee; color: transparent; user-select: none; }

    /* ── releases ── */
    .releases { border: 1px solid #000; margin-top: 24px; }
    .release-row {
      display: grid;
      grid-template-columns: 1fr 120px 90px 16px;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid #ddd;
      text-decoration: none;
      color: #000;
    }
    .release-row:last-child { border-bottom: none; }
    .release-row:hover { background: #f9f9f9; }
    .release-tag { font-weight: 500; font-size: 13px; }
    .release-name { font-size: 12px; color: #888; margin-top: 2px; }
    .release-date { font-size: 12px; color: #888; }
    .release-dl { font-size: 12px; font-weight: 500; text-align: right; }
    .arrow { color: #ccc; font-size: 12px; text-align: right; }

    /* ── features ── */
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid #000;
    }
    .feat {
      padding: 24px 20px;
      border-right: 1px solid #000;
      border-bottom: 1px solid #000;
    }
    .feat:nth-child(2n) { border-right: none; }
    .feat:nth-child(3), .feat:nth-child(4) { border-bottom: none; }
    .feat-title { font-weight: 600; font-size: 13px; margin-bottom: 6px; }
    .feat-desc { font-size: 13px; color: #555; line-height: 1.6; }

    /* ── footer ── */
    footer {
      border-top: 1px solid #000;
      padding: 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #888;
    }
    footer a { color: #888; }
    footer a:hover { color: #000; }

    @media (max-width: 580px) {
      .hero h1 { font-size: 28px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .stat:nth-child(2) { border-right: none; }
      .stat:nth-child(1), .stat:nth-child(2) { border-bottom: 1px solid #000; }
      .release-row { grid-template-columns: 1fr auto; }
      .release-date, .arrow { display: none; }
      .features { grid-template-columns: 1fr; }
      .feat { border-right: none; }
      .feat:nth-child(3) { border-bottom: 1px solid #000; }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <span class="logo">My Projects:</span>
  </div>
</header>

<div class="container">

  <div class="hero">
    <a class="btn btn-ghost btn-spotify" href="https://open.spotify.com/artist/0CBoBG2rLnql8rJGcfG0hb?si=Vkuf9pyZRs2VdfrnYY3YGA" target="_blank" rel="noopener">spotify</a>
    <a class="btn btn-ghost btn-soundcloud" href="https://soundcloud.com/3xistent" target="_blank" rel="noopener">soundcloud</a>
    <a class="btn btn-ghost btn-github" href="https://github.com/Jurdus/" target="_blank" rel="noopener">github</a>
    <a class="btn btn-ghost btn-alterdrop" href="https://jurdus.github.io/alterdrop.html" target="_blank" rel="noopener">alterdrop</a>
    <a class="btn btn-ghost btn-maurice" href="https://maurice.sk" target="_blank" rel="noopener">maurice</a>
  </div>
  
</div>

<header class  = "bottom">

</header>

  <div class="container">
    <span class="name">juraj rojko</span>
  </div>




</body>
</html>
